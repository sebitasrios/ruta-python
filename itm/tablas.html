  <defs>

      <polygon points="0 0, 10 3, 0 6" fill="#333" />

  </defs>

  <text x="610" y="480" font-size="14" fill="white">Genero</text>

  <line x1="200" y1="240" x2="360" y2="240" stroke="white" stroke-width="2"/>
  <text x="210" y="260" font-size="14" fill="white">Nombre (UNIQUE)</text>

  <text x="210" y="300" font-size="14" fill="white">Año Nacimiento</text>

  <rect x="1000" y="200" width="160" height="120" fill="#4A90E2" stroke="#333" stroke-width="2"/>

  <text x="1010" y="260" font-size="14" fill="white">Revista</text>
  <text x="1010" y="280" font-size="14" fill="white">Fecha</text>
  <text x="1010" y="300" font-size="14" fill="white">Texto</text>
  
  <!-- Entidad EDICION -->
  <rect x="600" y="680" width="160" height="120" fill="#4A90E2" stroke="#333" stroke-width="2"/>
  <text x="680" y="710" text-anchor="middle" font-size="18" font-weight="bold" fill="white">EDICION</text>
  <line x1="600" y1="720" x2="760" y2="720" stroke="white" stroke-width="2"/>

  <rect x="950" y="680" width="160" height="100" fill="#4A90E2" stroke="#333" stroke-width="2"/>

  <text x="960" y="760" font-size="14" fill="white">Estado</text>
  
  <!-- Entidad USUARIO -->
  <rect x="1200" y="480" width="160" height="120" fill="#4A90E2" stroke="#333" stroke-width="2"/>
  <text x="1280" y="510" text-anchor="middle" font-size="18" font-weight="bold" fill="white">USUARIO</text>
  <line x1="1200" y1="520" x2="1360" y2="520" stroke="white" stroke-width="2"/>
  <text x="1210" y="540" font-size="14" fill="white">DNI (PK)</text>
  <text x="1210" y="560" font-size="14" fill="white">Nombre</text>
  <text x="1210" y="580" font-size="14" fill="white">Apellido</text>
  
  <!-- Relación ESCRIBE (N:M) -->
  <polygon points="450,260 500,240 550,260 500,280" fill="#E8B44C" stroke="#333" stroke-width="2"/>
  <text x="500" y="265" text-anchor="middle" font-size="14" font-weight="bold">escribe</text>
  
  <!-- Líneas AUTOR - ESCRIBE - LIBRO -->
  <line x1="360" y1="260" x2="450" y2="260" stroke="#333" stroke-width="2"/>
  <line x1="550" y1="260" x2="600" y2="400" stroke="#333" stroke-width="2"/>
  <text x="380" y="250" font-size="12" fill="#333">(1,N)</text>
  <text x="570" y="390" font-size="12" fill="#333">(1,N)</text>
  
  <!-- Relación TIENE (RESEÑA) -->
  <polygon points="870,260 920,240 970,260 920,280" fill="#E8B44C" stroke="#333" stroke-width="2"/>
  <text x="920" y="265" text-anchor="middle" font-size="14" font-weight="bold">tiene</text>
  
  <!-- Líneas LIBRO - TIENE - RESEÑA -->

  <line x1="970" y1="260" x2="1000" y2="260" stroke="#333" stroke-width="2"/>

  <text x="975" y="250" font-size="12" fill="#333">(1,1)</text>

  <polygon points="520,460 570,440 620,460 570,480" fill="#E8B44C" stroke="#333" stroke-width="2"/>
  <text x="570" y="465" text-anchor="middle" font-size="13" font-weight="bold">referencia</text>
  
  <!-- Líneas autorreferenciales LIBRO -->
  <path d="M 600,480 Q 520,500 560,430" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M 680,400 Q 680,350 620,410" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="490" y="500" font-size="12" fill="#333">(1,N)</text>
  <text x="640" y="370" font-size="12" fill="#333">(1,N)</text>
  
  <!-- Relación TIENE (EDICION) -->
  <polygon points="650,580 700,560 750,580 700,600" fill="#E8B44C" stroke="#333" stroke-width="2"/>
  <text x="700" y="585" text-anchor="middle" font-size="14" font-weight="bold">tiene</text>

  <line x1="680" y1="520" x2="680" y2="560" stroke="#333" stroke-width="2"/>
  <line x1="680" y1="600" x2="680" y2="680" stroke="#333" stroke-width="2"/>
  <text x="690" y="545" font-size="12" fill="#333">(1,N)</text>
  <text x="690" y="670" font-size="12" fill="#333">(1,1)</text>

  <polygon points="820,730 870,710 920,730 870,750" fill="#E8B44C" stroke="#333" stroke-width="2"/>
  <text x="870" y="735" text-anchor="middle" font-size="14" font-weight="bold">posee</text>
  
  <!-- Líneas EDICION - POSEE - COPIA -->
  <line x1="760" y1="730" x2="820" y2="730" stroke="#333" stroke-width="2"/>
  <line x1="920" y1="730" x2="950" y2="730" stroke="#333" stroke-width="2"/>
  <text x="780" y="720" font-size="12" fill="#333">(1,N)</text>
  <text x="925" y="720" font-size="12" fill="#333">(1,1)</text>
  
  <!-- Relación PRESTAMO -->
  <polygon points="1120,600 1170,580 1220,600 1170,620" fill="#E8B44C" stroke="#333" stroke-width="2"/>
  <text x="1170" y="605" text-anchor="middle" font-size="13" font-weight="bold">PRESTAMO</text>
  <text x="1130" y="635" font-size="11" fill="#333">Fecha_Prestamo</text>
  <text x="1130" y="650" font-size="11" fill="#333">Fecha_Devolucion</text>
  
  <!-- Líneas COPIA - PRESTAMO - USUARIO -->
  <line x1="1030" y1="680" x2="1120" y2="600" stroke="#333" stroke-width="2"/>
  <line x1="1220" y1="600" x2="1280" y2="580" stroke="#333" stroke-width="2"/>
  <text x="1040" y="670" font-size="12" fill="#333">(0,N)</text>
  <text x="1240" y="585" font-size="12" fill="#333">(0,N)</text>
  
  <!-- Título -->
  <text x="700" y="50" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">Modelo Entidad-Relación - Sistema de Biblioteca</text>
  
  <!-- Leyenda -->
  <rect x="50" y="850" width="300" height="120" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
  <text x="200" y="875" text-anchor="middle" font-size="16" font-weight="bold">Leyenda</text>
  <rect x="60" y="885" width="40" height="20" fill="#4A90E2" stroke="#333"/>
  <text x="110" y="900" font-size="13">= Entidad</text>
  <polygon points="60,925 80,915 100,925 80,935" fill="#E8B44C" stroke="#333"/>
  <text x="110" y="930" font-size="13">= Relación</text>
  <text x="60" y="955" font-size="13">(min,max) = Cardinalidad</text>
</svg>
